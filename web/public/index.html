<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="KSE Index Viewer — live PSX indices and portfolio tracker. Free, no signup, your data stays in your own Google Sheet." />
  <title>KSE Index Viewer</title>

  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" type="image/png" href="/icons/icon-192.png" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.27/dist/uPlot.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <main id="app" class="app-shell">
    <header class="app-header">
      <h1 id="page-title">KSE Index Viewer</h1>
      <div class="header-actions">
        <button id="btn-primary-action" class="header-btn primary" hidden></button>
        <button id="btn-refresh" class="header-btn" title="Refresh" aria-label="Refresh">↻</button>
      </div>
    </header>

    <section id="page" class="page" aria-live="polite">
      <div class="loading">Loading…</div>
    </section>

    <nav class="bottom-nav" aria-label="Main navigation">
      <a href="#/indices"   data-nav="indices"   class="nav-item"><span class="nav-ico">📈</span><span>Indices</span></a>
      <a href="#/market"    data-nav="market"    class="nav-item"><span class="nav-ico">🔎</span><span>Market</span></a>
      <a href="#/portfolio" data-nav="portfolio" class="nav-item"><span class="nav-ico">💼</span><span>Portfolio</span></a>
      <a href="#/settings"  data-nav="settings"  class="nav-item"><span class="nav-ico">⚙️</span><span>Settings</span></a>
    </nav>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.27/dist/uPlot.iife.min.js"></script>
  <script type="module" src="/js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => console.warn('SW reg failed', err));
      });
    }
  </script>
</body>
</html>
